<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TrackWizz Deploy</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:         #f7f7f6;
  --surface:    #ffffff;
  --surface2:   #f1f0ee;
  --border:     #dddcda;
  --border2:    #c8c7c4;
  --text:       #1a1a18;
  --text2:      #5c5b57;
  --text3:      #999894;
  --blue:       #378ADD;
  --blue-bg:    #e6f1fb;
  --blue-text:  #0c447c;
  --green:      #3B6D11;
  --green-bg:   #eaf3de;
  --red:        #a32d2d;
  --red-bg:     #fcebeb;
  --amber:      #854f0b;
  --amber-bg:   #faeeda;
  --radius:     8px;
  --radius-lg:  12px;
  --font:       -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  --mono:       'Cascadia Code', 'Consolas', 'Menlo', monospace;
}

body { font-family: var(--font); background: var(--bg); color: var(--text); min-height: 100vh; }

/* ── Layout ── */
.layout { display: grid; grid-template-columns: 380px 1fr; min-height: 100vh; }
.sidebar {
  background: var(--surface); border-right: 0.5px solid var(--border);
  padding: 1.5rem; display: flex; flex-direction: column; gap: 1.25rem;
  position: sticky; top: 0; height: 100vh; overflow-y: auto;
}
.main { padding: 1.5rem; display: flex; flex-direction: column; gap: 1.25rem; }

/* ── Topbar in sidebar ── */
.brand { display: flex; align-items: center; gap: 10px; padding-bottom: 1rem; border-bottom: 0.5px solid var(--border); }
.brand-icon {
  width: 32px; height: 32px; border-radius: 8px; background: var(--blue);
  display: flex; align-items: center; justify-content: center;
  color: #fff; font-size: 16px; flex-shrink: 0;
}
.brand-name { font-size: 15px; font-weight: 500; }
.brand-sub  { font-size: 11px; color: var(--text3); margin-top: 1px; }

/* ── Section labels ── */
.label {
  font-size: 10px; font-weight: 600; color: var(--text3);
  text-transform: uppercase; letter-spacing: .08em; margin-bottom: 6px;
}

/* ── Stack tabs ── */
.tabs { display: flex; gap: 6px; flex-wrap: wrap; }
.tab {
  padding: 5px 13px; font-size: 12px; border-radius: 6px;
  border: 0.5px solid var(--border2); background: transparent;
  color: var(--text2); cursor: pointer; font-family: var(--font);
  transition: all .12s;
}
.tab:hover { background: var(--surface2); }
.tab.active { background: var(--blue); border-color: var(--blue); color: #fff; font-weight: 500; }

/* ── Services list ── */
.svc-list { display: flex; flex-direction: column; gap: 5px; }
.svc-item {
  display: flex; align-items: center; gap: 9px; padding: 8px 10px;
  border: 0.5px solid var(--border); border-radius: var(--radius);
  cursor: pointer; transition: all .12s; background: var(--surface);
  user-select: none;
}
.svc-item:hover { border-color: var(--border2); background: var(--surface2); }
.svc-item.selected { border-color: var(--blue); background: var(--blue-bg); }
.chk {
  width: 15px; height: 15px; border-radius: 4px; border: 0.5px solid var(--border2);
  flex-shrink: 0; display: flex; align-items: center; justify-content: center;
  font-size: 10px; transition: all .12s;
}
.svc-item.selected .chk { background: var(--blue); border-color: var(--blue); color: #fff; }
.svc-name { font-size: 12px; color: var(--text); flex: 1; }
.badge {
  font-size: 9px; padding: 2px 6px; border-radius: 3px;
  font-weight: 600; flex-shrink: 0; letter-spacing: .02em;
}
.b-dotnet { background: #EEEDFE; color: #3C3489; }
.b-java   { background: #EAF3DE; color: #27500A; }
.b-ui     { background: #E6F1FB; color: #0C447C; }

.sel-bar { display: flex; justify-content: space-between; align-items: center; }
.sel-all { font-size: 11px; color: var(--text3); background: none; border: none; cursor: pointer; font-family: var(--font); }
.sel-all:hover { color: var(--text); }

/* ── Inputs ── */
.field { display: flex; flex-direction: column; gap: 5px; }
.field label { font-size: 11px; font-weight: 500; color: var(--text2); }
.field input {
  padding: 8px 10px; font-size: 13px; border: 0.5px solid var(--border2);
  border-radius: var(--radius); background: var(--surface);
  color: var(--text); font-family: var(--font); outline: none;
  transition: border-color .12s;
}
.field input:focus { border-color: var(--blue); box-shadow: 0 0 0 2px #378add1a; }
.field input::placeholder { color: var(--text3); }

/* ── Deploy button ── */
.deploy-btn {
  width: 100%; padding: 10px; background: var(--blue); color: #fff;
  border: none; border-radius: var(--radius); font-size: 13px;
  font-weight: 500; cursor: pointer; font-family: var(--font);
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: opacity .12s; margin-top: auto;
}
.deploy-btn:hover { opacity: .88; }
.deploy-btn:disabled { opacity: .35; cursor: not-allowed; }
.deploy-btn.running { background: var(--red); }
.deploy-btn.running:hover { opacity: .88; }

/* ── Main panel ── */
.panel {
  background: var(--surface); border: 0.5px solid var(--border);
  border-radius: var(--radius-lg); overflow: hidden;
}
.panel-header {
  padding: 12px 16px; border-bottom: 0.5px solid var(--border);
  display: flex; align-items: center; justify-content: space-between;
}
.panel-title { font-size: 13px; font-weight: 500; }

/* ── Status badge ── */
.status-badge {
  font-size: 11px; padding: 3px 10px; border-radius: 10px; font-weight: 500;
}
.s-idle    { background: var(--surface2); color: var(--text3); }
.s-running { background: var(--amber-bg); color: var(--amber); }
.s-done    { background: var(--green-bg); color: var(--green); }
.s-failed  { background: var(--red-bg);   color: var(--red);   }

/* ── Summary cards ── */
.summary-row { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; padding: 12px 16px; }
.sum-card { padding: 10px 12px; background: var(--surface2); border-radius: var(--radius); }
.sum-label { font-size: 10px; color: var(--text3); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; }
.sum-val { font-size: 14px; font-weight: 500; color: var(--text); margin-top: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

/* ── Progress ── */
.progress-wrap { padding: 0 16px 12px; }
.progress-track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.progress-fill  { height: 100%; background: var(--blue); border-radius: 2px; transition: width .4s ease; width: 0%; }

/* ── Log ── */
.log-wrap { padding: 0 0 0 0; flex: 1; }
.log-area {
  font-family: var(--mono); font-size: 11.5px; line-height: 1.8;
  padding: 12px 16px; height: 420px; overflow-y: auto;
  background: #16161a; color: #c9c9c3; border-top: 0.5px solid var(--border);
}
.log-line { display: flex; gap: 10px; }
.log-t    { color: #555552; flex-shrink: 0; }
.log-info { color: #c9c9c3; }
.log-ok   { color: #a8cc8c; }
.log-err  { color: #e88388; }
.log-warn { color: #f6b97e; }
.log-dim  { color: #555552; }
.log-head { color: #ffffff; font-weight: 500; }

.log-empty {
  display: flex; align-items: center; justify-content: center;
  height: 100%; color: #555552; font-size: 12px;
}

/* ── Idle placeholder ── */
.idle-state {
  display: flex; flex-direction: column; align-items: center;
  justify-content: center; height: 420px; gap: 8px;
  border-top: 0.5px solid var(--border); background: #16161a;
}
.idle-icon { font-size: 32px; opacity: .15; }
.idle-text { font-size: 12px; color: #555552; }

/* ── Responsive ── */
@media (max-width: 860px) {
  .layout { grid-template-columns: 1fr; }
  .sidebar { height: auto; position: static; border-right: none; border-bottom: 0.5px solid var(--border); }
  .log-area { height: 300px; }
}
</style>
</head>
<body>
<div class="layout">

  <!-- ── Sidebar ── -->
  <aside class="sidebar">
    <div class="brand">
      <div class="brand-icon">T</div>
      <div>
        <div class="brand-name">TrackWizz</div>
        <div class="brand-sub">Deploy builder</div>
      </div>
    </div>

    <!-- Stack filter -->
    <div>
      <div class="label">Stack</div>
      <div class="tabs">
        <button class="tab active" onclick="setStack('all')">All</button>
        <button class="tab" onclick="setStack('dotnet')">.NET</button>
        <button class="tab" onclick="setStack('java')">Java</button>
        <button class="tab" onclick="setStack('ui')">Frontend</button>
      </div>
    </div>

    <!-- Services -->
    <div style="flex:1;overflow-y:auto;min-height:0">
      <div class="sel-bar" style="margin-bottom:6px">
        <div class="label" style="margin:0">Services</div>
        <button class="sel-all" id="sel-all-btn" onclick="toggleAll()">Select all</button>
      </div>
      <div class="svc-list" id="svc-list"></div>
    </div>

    <!-- Branch & version -->
    <div style="display:flex;flex-direction:column;gap:10px">
      <div class="field">
        <label for="branch">Branch</label>
        <input id="branch" type="text" placeholder="e.g. feature/payments-v2" oninput="onInput()">
      </div>
      <div class="field">
        <label for="version">Version</label>
        <input id="version" type="text" placeholder="e.g. 1.4.22" oninput="onInput()">
      </div>
    </div>

    <button class="deploy-btn" id="deploy-btn" disabled onclick="handleDeploy()">
      <span id="btn-icon">▶</span>
      <span id="btn-label">Deploy</span>
    </button>
  </aside>

  <!-- ── Main ── -->
  <main class="main">
    <div class="panel">
      <div class="panel-header">
        <span class="panel-title">Deploy log</span>
        <span class="status-badge s-idle" id="status-badge">Idle</span>
      </div>

      <div class="summary-row">
        <div class="sum-card">
          <div class="sum-label">Branch</div>
          <div class="sum-val" id="sum-branch">—</div>
        </div>
        <div class="sum-card">
          <div class="sum-label">Version</div>
          <div class="sum-val" id="sum-version">—</div>
        </div>
        <div class="sum-card">
          <div class="sum-label">Services</div>
          <div class="sum-val" id="sum-services">0 selected</div>
        </div>
      </div>

      <div class="progress-wrap">
        <div class="progress-track"><div class="progress-fill" id="progress"></div></div>
      </div>

      <div id="log-container">
        <div class="idle-state" id="idle-placeholder">
          <div class="idle-icon">⬡</div>
          <div class="idle-text">Logs will appear here when a deploy runs</div>
        </div>
        <div class="log-area" id="log-area" style="display:none"></div>
      </div>
    </div>
  </main>
</div>

<script>
const SERVICES = [
  {id:'apilogservice',               label:'APILog',               stack:'dotnet', type:'DOTNET'},
  {id:'configurationservice',        label:'Configuration',        stack:'dotnet', type:'DOTNET'},
  {id:'custinfoservice',             label:'CustomerInformation',  stack:'dotnet', type:'DOTNET'},
  {id:'customerstoreservice',        label:'CustomerStore',        stack:'dotnet', type:'DOTNET'},
  {id:'dbupgradeservice',            label:'DBUpgrade',            stack:'dotnet', type:'DOTNET'},
  {id:'dmsservice',                  label:'DMS',                  stack:'dotnet', type:'DOTNET'},
  {id:'emailservice',                label:'Email',                stack:'dotnet', type:'DOTNET'},
  {id:'reportservice',               label:'Report',               stack:'dotnet', type:'DOTNET'},
  {id:'schedulerservice',            label:'Scheduler',            stack:'dotnet', type:'DOTNET'},
  {id:'ckyc_search_download_service',label:'CKYC SearchDownload',  stack:'java',   type:'JAVA'},
  {id:'ckycsubmission',              label:'CKYC Submission',      stack:'java',   type:'JAVA'},
  {id:'ckycnotification',            label:'CKYC Notification',    stack:'java',   type:'JAVA'},
  {id:'rekyc',                       label:'RE-KYC',               stack:'java',   type:'JAVA'},
  {id:'jconfig',                     label:'JConfig',              stack:'java',   type:'JAVA'},
  {id:'screeningappservice',         label:'Screening UI',         stack:'ui',     type:'UI'},
  {id:'commonappservice',            label:'Common UI',            stack:'ui',     type:'UI'},
  {id:'shellappservice',             label:'Shell UI',             stack:'ui',     type:'UI'},
];

const BADGE_CLASS = {DOTNET:'b-dotnet', JAVA:'b-java', UI:'b-ui'};
const BADGE_LABEL = {DOTNET:'.NET',     JAVA:'Java',   UI:'UI'};

let stack    = 'all';
let selected = new Set();
let deploying = false;
let eventSource = null;
let progressTimer = null;
let fakeProgress = 0;

// ── Render sidebar list ────────────────────────────────────────────────────
function visible(){ return stack === 'all' ? SERVICES : SERVICES.filter(s => s.stack === stack); }

function renderList(){
  const list = document.getElementById('svc-list');
  list.innerHTML = visible().map(s => `
    <div class="svc-item${selected.has(s.id)?' selected':''}" onclick="toggleSvc('${s.id}')">
      <div class="chk">${selected.has(s.id)?'✓':''}</div>
      <div class="svc-name">${s.label}</div>
      <span class="badge ${BADGE_CLASS[s.type]}">${BADGE_LABEL[s.type]}</span>
    </div>
  `).join('');
  const all = visible().every(s => selected.has(s.id)) && visible().length > 0;
  document.getElementById('sel-all-btn').textContent = all ? 'Deselect all' : 'Select all';
  updateSummary();
}

function toggleSvc(id){ selected.has(id) ? selected.delete(id) : selected.add(id); renderList(); }

function setStack(s){
  stack = s;
  document.querySelectorAll('.tab').forEach((b,i) => b.classList.toggle('active', ['all','dotnet','java','ui'][i]===s));
  renderList();
}

function toggleAll(){
  const svcs = visible();
  const all  = svcs.every(s => selected.has(s.id));
  svcs.forEach(s => all ? selected.delete(s.id) : selected.add(s.id));
  renderList();
}

// ── Inputs ────────────────────────────────────────────────────────────────
function onInput(){ updateSummary(); }

function updateSummary(){
  const branch  = document.getElementById('branch').value.trim();
  const version = document.getElementById('version').value.trim();
  const count   = selected.size;

  document.getElementById('sum-branch').textContent   = branch  || '—';
  document.getElementById('sum-version').textContent  = version || '—';
  document.getElementById('sum-services').textContent = count + ' selected';

  const btn = document.getElementById('deploy-btn');
  btn.disabled = deploying || count === 0 || !branch || !version;
}

// ── Log helpers ───────────────────────────────────────────────────────────
function showLog(){
  document.getElementById('idle-placeholder').style.display = 'none';
  document.getElementById('log-area').style.display = 'block';
}

function addLog(time, line, type){
  const area = document.getElementById('log-area');
  const div  = document.createElement('div');
  div.className = 'log-line';
  div.innerHTML = `<span class="log-t">${time}</span><span class="log-${type}">${escHtml(line)}</span>`;
  area.appendChild(div);
  area.scrollTop = area.scrollHeight;
}

function clearLog(){
  document.getElementById('log-area').innerHTML = '';
}

function escHtml(s){
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
}

// ── Status helpers ────────────────────────────────────────────────────────
function setStatus(s){
  const badge = document.getElementById('status-badge');
  const map   = { idle:'Idle', running:'Running…', done:'Done', failed:'Failed' };
  const cls   = { idle:'s-idle', running:'s-running', done:'s-done', failed:'s-failed' };
  badge.textContent = map[s] || s;
  badge.className   = 'status-badge ' + (cls[s] || 's-idle');
}

function setProgress(pct){
  document.getElementById('progress').style.width = pct + '%';
}

function startFakeProgress(){
  fakeProgress = 0;
  clearInterval(progressTimer);
  progressTimer = setInterval(() => {
    // Crawl up to 90% while running, leave last 10% for real done
    if(fakeProgress < 88){ fakeProgress += (88 - fakeProgress) * 0.012; }
    setProgress(fakeProgress);
  }, 400);
}

function stopFakeProgress(success){
  clearInterval(progressTimer);
  setProgress(success ? 100 : fakeProgress);
}

// ── SSE connection ────────────────────────────────────────────────────────
function connectSSE(){
  if(eventSource) eventSource.close();
  eventSource = new EventSource('/api/logs/stream');

  eventSource.onmessage = (e) => {
    const data = JSON.parse(e.data);

    if(data.event === 'clear'){
      clearLog(); showLog();
    }
    if(data.event === 'log'){
      showLog();
      addLog(data.time, data.line, data.type);
    }
    if(data.event === 'status'){
      const s = data.status;
      setStatus(s);
      if(s === 'running'){
        deploying = true;
        startFakeProgress();
        document.getElementById('deploy-btn').classList.add('running');
        document.getElementById('btn-icon').textContent  = '■';
        document.getElementById('btn-label').textContent = 'Cancel';
        document.getElementById('deploy-btn').disabled   = false;
      }
      if(s === 'done' || s === 'failed'){
        deploying = false;
        stopFakeProgress(s === 'done');
        document.getElementById('deploy-btn').classList.remove('running');
        document.getElementById('btn-icon').textContent  = '▶';
        document.getElementById('btn-label').textContent = 'Deploy';
        updateSummary();
      }
    }
  };

  eventSource.onerror = () => {
    // Reconnect after 3s
    setTimeout(connectSSE, 3000);
  };
}

// ── Deploy / Cancel ───────────────────────────────────────────────────────
async function handleDeploy(){
  if(deploying){
    await fetch('/api/cancel', { method: 'POST' });
    return;
  }

  const branch   = document.getElementById('branch').value.trim();
  const version  = document.getElementById('version').value.trim();
  const services = [...selected];

  const res = await fetch('/api/deploy', {
    method:  'POST',
    headers: { 'Content-Type': 'application/json' },
    body:    JSON.stringify({ branch, version, services }),
  });

  if(!res.ok){
    const err = await res.json();
    alert('Error: ' + err.error);
  }
}

// ── Init ──────────────────────────────────────────────────────────────────
renderList();
connectSSE();
</script>
</body>
</html>
